services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: "cov"
      POSTGRES_PASSWORD: "cov"
      POSTGRES_DB: "cov"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: quay.io/minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: "cov"
      MINIO_ROOT_PASSWORD: "covcovcov"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
